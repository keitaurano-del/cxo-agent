<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Logic v2 — Home</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAF7;
    --surface: #FFFFFF;
    --surface-2: #F4F3EE;
    --border: #EDEDE9;
    --border-2: #D8D7D2;
    --text: #191918;
    --text-mute: #6F6F6A;
    --text-faint: #9B9A93;
    --accent: #FF6B4A;
    --accent-hover: #E85737;
    --accent-soft: #FFF1ED;
    --streak: #F59E0B;
    --streak-soft: #FEF3C7;
    --success: #10B981;
    --r-card: 16px;
    --r-btn: 12px;
    --r-hero: 24px;
    --shadow-card: 0 1px 2px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04);
    --shadow-cta: 0 4px 14px rgba(255, 107, 74, 0.28);
    --font-ui: "Inter", "Noto Sans JP", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
  }
  .screen {
    max-width: 390px;
    min-height: 100vh;
    margin: 0 auto;
    padding: 24px 20px 100px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }
  .greeting h1 { font-size: 30px; font-weight: 800; letter-spacing: -0.025em; margin: 0 0 4px; }
  .greeting p { font-size: 15px; color: var(--text-mute); margin: 0; }

  .streak-card {
    background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%);
    border-radius: var(--r-hero);
    padding: 20px 22px;
    box-shadow: var(--shadow-card);
  }
  .streak-row { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .streak-fire {
    font-size: 32px;
    line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(245,158,11,0.4));
  }
  .streak-num { font-size: 36px; font-weight: 800; color: #92400E; line-height: 1; letter-spacing: -0.03em; }
  .streak-label { font-size: 13px; font-weight: 600; color: #78350F; margin-top: 2px; }
  .streak-bar-wrap { background: rgba(120, 53, 15, 0.15); height: 8px; border-radius: 999px; overflow: hidden; }
  .streak-bar-fill { background: #92400E; height: 100%; width: 71%; border-radius: 999px; }
  .streak-meta { font-size: 12px; color: #78350F; margin-top: 8px; font-weight: 500; }

  .level-section { display: flex; flex-direction: column; gap: 10px; }
  .level-row { display: flex; align-items: baseline; justify-content: space-between; }
  .level-name { font-size: 17px; font-weight: 700; }
  .level-xp { font-size: 13px; color: var(--text-mute); font-variant-numeric: tabular-nums; }
  .level-bar-wrap { background: var(--surface-2); height: 12px; border-radius: 999px; overflow: hidden; }
  .level-bar-fill {
    background: linear-gradient(90deg, var(--accent) 0%, #FFA585 100%);
    height: 100%;
    width: 74%;
    border-radius: 999px;
    box-shadow: 0 2px 8px rgba(255,107,74,0.4);
  }

  .caption {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-faint);
    margin: 0;
  }

  .featured-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: var(--shadow-card);
  }
  .featured-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 4px 10px;
    border-radius: 999px;
    width: fit-content;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .featured-q { font-size: 19px; font-weight: 700; line-height: 1.4; letter-spacing: -0.015em; }
  .featured-cta {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: var(--r-btn);
    padding: 14px 20px;
    font-size: 15px;
    font-weight: 600;
    font-family: var(--font-ui);
    cursor: pointer;
    box-shadow: var(--shadow-cta);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .featured-cta svg { width: 16px; height: 16px; }

  .cat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .cat-tile {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-card);
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    cursor: pointer;
    transition: transform 120ms ease, box-shadow 120ms ease;
  }
  .cat-tile:hover { transform: translateY(-2px); box-shadow: var(--shadow-card); }
  .cat-icon { font-size: 26px; line-height: 1; }
  .cat-name { font-size: 14px; font-weight: 700; }
  .cat-meta { font-size: 11px; color: var(--text-faint); font-variant-numeric: tabular-nums; }
  .cat-progress { background: var(--surface-2); height: 4px; border-radius: 999px; overflow: hidden; }
  .cat-progress-fill { background: var(--accent); height: 100%; border-radius: 999px; }

  .tabbar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 390px;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 10px 0 28px;
    z-index: 100;
  }
  .tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    border: none;
    background: transparent;
    color: var(--text-faint);
    font-size: 11px;
    font-weight: 600;
    font-family: var(--font-ui);
    cursor: pointer;
    padding: 4px 0;
  }
  .tab.active { color: var(--accent); }
  .tab svg { width: 22px; height: 22px; }
</style>
</head>
<body>
<div class="screen">

  <header class="greeting">
    <h1>おはよう、Keita</h1>
    <p>学びを一歩ずつ。</p>
  </header>

  <section class="streak-card">
    <div class="streak-row">
      <div class="streak-fire">🔥</div>
      <div>
        <div class="streak-num">7</div>
        <div class="streak-label">連続学習日数</div>
      </div>
    </div>
    <div class="streak-bar-wrap"><div class="streak-bar-fill"></div></div>
    <div class="streak-meta">今週 5 / 7 日</div>
  </section>

  <section class="level-section">
    <div class="level-row">
      <div class="level-name">Lv.4 見習い探偵</div>
      <div class="level-xp">740 / 1000 XP</div>
    </div>
    <div class="level-bar-wrap"><div class="level-bar-fill"></div></div>
  </section>

  <section>
    <p class="caption" style="margin-bottom:10px;">今日のおすすめ</p>
    <div class="featured-card">
      <span class="featured-tag">Fermi 推定</span>
      <div class="featured-q">日本にある電柱の本数は<br>どれくらい?</div>
      <button class="featured-cta">
        始める
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>
  </section>

  <section>
    <p class="caption" style="margin-bottom:10px;">すべてのカテゴリ</p>
    <div class="cat-grid">
      <div class="cat-tile">
        <div class="cat-icon">📊</div>
        <div class="cat-name">フェルミ推定</div>
        <div class="cat-meta">12 / 20 完了</div>
        <div class="cat-progress"><div class="cat-progress-fill" style="width:60%"></div></div>
      </div>
      <div class="cat-tile">
        <div class="cat-icon">🧠</div>
        <div class="cat-name">論理パズル</div>
        <div class="cat-meta">8 / 25 完了</div>
        <div class="cat-progress"><div class="cat-progress-fill" style="width:32%"></div></div>
      </div>
      <div class="cat-tile">
        <div class="cat-icon">💼</div>
        <div class="cat-name">ケース面接</div>
        <div class="cat-meta">3 / 15 完了</div>
        <div class="cat-progress"><div class="cat-progress-fill" style="width:20%"></div></div>
      </div>
      <div class="cat-tile">
        <div class="cat-icon">📚</div>
        <div class="cat-name">PM 入門</div>
        <div class="cat-meta">5 / 12 完了</div>
        <div class="cat-progress"><div class="cat-progress-fill" style="width:42%"></div></div>
      </div>
    </div>
  </section>

</div>

<nav class="tabbar">
  <button class="tab active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </button>
  <button class="tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    Lessons
  </button>
  <button class="tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a7 7 0 0 1 14 0v1"/></svg>
    Profile
  </button>
</nav>
</body>
</html>
