<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Logic v3 — Profile (Mobile)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<style>
  .screen { max-width: 430px; margin: 0 auto; padding: 28px 22px 110px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 26px; }
  .topbar h1 { font-family: var(--font-display); font-size: 28px; font-weight: 800; letter-spacing: -0.025em; }
  .icon-btn {
    width: 40px; height: 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-full);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-mute);
    cursor: pointer;
  }
  .icon-btn svg { width: 18px; height: 18px; }

  .hero {
    background: var(--navy);
    color: white;
    border-radius: var(--r-2xl);
    padding: 32px 26px 28px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: "";
    position: absolute;
    top: -80px; right: -80px;
    width: 240px; height: 240px;
    background: radial-gradient(circle, rgba(61,95,196,0.4) 0%, transparent 70%);
    border-radius: 50%;
  }
  .hero-inner { position: relative; display: flex; align-items: center; gap: 18px; margin-bottom: 22px; }
  .avatar {
    width: 68px; height: 68px;
    background: linear-gradient(135deg, var(--accent) 0%, #9EB3F0 100%);
    border-radius: var(--r-full);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
    box-shadow: 0 8px 24px rgba(61,95,196,0.5);
    border: 3px solid white;
  }
  .hero-name { font-family: var(--font-display); font-size: 24px; font-weight: 800; letter-spacing: -0.02em; }
  .hero-level { font-size: 12px; color: rgba(255,255,255,0.65); font-weight: 500; margin-top: 2px; letter-spacing: 0.04em; text-transform: uppercase; }

  .hero-xp-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 8px;
    position: relative;
  }
  .hero-xp-label { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.6); }
  .hero-xp-val { font-family: var(--font-mono); font-size: 12px; color: rgba(255,255,255,0.8); }
  .hero-xp-wrap {
    background: rgba(255, 255, 255, 0.12);
    height: 8px;
    border-radius: var(--r-full);
    overflow: hidden;
    position: relative;
  }
  .hero-xp-fill {
    background: var(--accent);
    height: 100%;
    width: 74%;
    border-radius: var(--r-full);
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .stats-grid.triple { grid-template-columns: 1fr 1fr 1fr; margin-bottom: 28px; }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 18px 12px;
    text-align: center;
  }
  .stat-icon { font-size: 20px; margin-bottom: 4px; }
  .stat-value { font-family: var(--font-display); font-size: 24px; font-weight: 900; letter-spacing: -0.025em; }
  .stat-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin-top: 2px;
  }

  .section { margin-bottom: 28px; }
  .section h2 {
    font-family: var(--font-display);
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.015em;
    margin-bottom: 14px;
  }

  .calendar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-lg);
    padding: 20px;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 3px;
  }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 3px;
    background: var(--surface-2);
  }
  .cal-day.l1 { background: #E1E8F9; }
  .cal-day.l2 { background: #B6C3E8; }
  .cal-day.l3 { background: #6B85D6; }
  .cal-day.l4 { background: var(--accent); }
  .cal-legend {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    font-size: 11px;
    color: var(--text-faint);
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .cal-legend-swatches { display: flex; gap: 3px; }
  .cal-legend-swatches > div { width: 10px; height: 10px; border-radius: 2px; }

  .cat-row {
    display: grid;
    grid-template-columns: 90px 1fr 44px;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }
  .cat-row:last-child { margin-bottom: 0; }
  .cat-row-name { font-size: 13px; font-weight: 600; }
  .cat-row-bar-wrap { background: var(--surface-2); height: 8px; border-radius: var(--r-full); overflow: hidden; }
  .cat-row-bar-fill { background: var(--accent); height: 100%; border-radius: var(--r-full); }
  .cat-row-val {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-mute);
    text-align: right;
    font-weight: 600;
  }

  .rank-card {
    background: linear-gradient(135deg, var(--brand) 0%, var(--brand-mid) 100%);
    color: white;
    border-radius: var(--r-xl);
    padding: 22px;
    margin-bottom: 28px;
    position: relative;
    overflow: hidden;
  }
  .rank-card::before {
    content: "";
    position: absolute;
    top: -40px; right: -40px;
    width: 180px; height: 180px;
    background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
    border-radius: 50%;
  }
  .rank-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.7); margin-bottom: 6px; position: relative; }
  .rank-top { display: flex; align-items: baseline; gap: 16px; position: relative; }
  .rank-num { font-family: var(--font-display); font-size: 46px; font-weight: 900; letter-spacing: -0.03em; line-height: 1; }
  .rank-meta-top { font-size: 13px; font-weight: 600; }
  .rank-meta-sub { font-size: 11px; color: rgba(255,255,255,0.7); font-family: var(--font-mono); margin-top: 2px; }
  .rank-bar-wrap { background: rgba(255,255,255,0.2); height: 6px; border-radius: var(--r-full); overflow: hidden; margin-top: 14px; position: relative; }
  .rank-bar-fill { background: white; height: 100%; width: 88%; border-radius: var(--r-full); }

  .hero-xp-chip {
    position: absolute;
    top: 24px; right: 24px;
    background: rgba(255,255,255,0.14);
    backdrop-filter: blur(10px);
    padding: 5px 10px;
    border-radius: var(--r-full);
    font-size: 11px;
    font-weight: 700;
    color: white;
    font-family: var(--font-mono);
    letter-spacing: 0.02em;
    z-index: 1;
  }
</style>
</head>
<body>
<div class="screen">

  <div class="topbar">
    <h1>You</h1>
    <button class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>

  <section class="hero">
    <div class="hero-inner">
      <div class="avatar">👤</div>
      <div>
        <div class="hero-name">Keita</div>
        <div class="hero-level">Lv.4 · 見習い探偵</div>
      </div>
    </div>
    <div class="hero-xp-row">
      <span class="hero-xp-label">LEVEL PROGRESS</span>
      <span class="hero-xp-val">740 / 1,000</span>
    </div>
    <div class="hero-xp-wrap"><div class="hero-xp-fill"></div></div>
  </section>

  <section class="rank-card">
    <div class="rank-eyebrow">NATIONAL RANKING · 偏差値 62.4</div>
    <div class="rank-top">
      <div class="rank-num">12<span style="font-size:22px;font-weight:700;">%</span></div>
      <div>
        <div class="rank-meta-top">上位 12%</div>
        <div class="rank-meta-sub">1,248 / 10,432 users</div>
      </div>
    </div>
    <div class="rank-bar-wrap"><div class="rank-bar-fill"></div></div>
  </section>

  <div class="stats-grid triple">
    <div class="stat">
      <div class="stat-icon">🔥</div>
      <div class="stat-value">7</div>
      <div class="stat-label">Streak</div>
    </div>
    <div class="stat">
      <div class="stat-icon">⭐</div>
      <div class="stat-value">1,240</div>
      <div class="stat-label">Points</div>
    </div>
    <div class="stat">
      <div class="stat-icon">✓</div>
      <div class="stat-value">23</div>
      <div class="stat-label">Done</div>
    </div>
  </div>

  <section class="section">
    <h2>Activity</h2>
    <div class="calendar-card">
      <div class="cal-grid" id="cal-grid"></div>
      <div class="cal-legend">
        Less
        <div class="cal-legend-swatches">
          <div style="background:var(--surface-2)"></div>
          <div style="background:#E1E8F9"></div>
          <div style="background:#B6C3E8"></div>
          <div style="background:#6B85D6"></div>
          <div style="background:var(--accent)"></div>
        </div>
        More
      </div>
    </div>
  </section>

  <section class="section">
    <h2>Category progress</h2>
    <div class="card" style="padding: 22px;">
      <div class="cat-row">
        <div class="cat-row-name">Fermi</div>
        <div class="cat-row-bar-wrap"><div class="cat-row-bar-fill" style="width:78%"></div></div>
        <div class="cat-row-val">78%</div>
      </div>
      <div class="cat-row">
        <div class="cat-row-name">Logic</div>
        <div class="cat-row-bar-wrap"><div class="cat-row-bar-fill" style="width:42%"></div></div>
        <div class="cat-row-val">42%</div>
      </div>
      <div class="cat-row">
        <div class="cat-row-name">Case</div>
        <div class="cat-row-bar-wrap"><div class="cat-row-bar-fill" style="width:20%"></div></div>
        <div class="cat-row-val">20%</div>
      </div>
      <div class="cat-row">
        <div class="cat-row-name">PM</div>
        <div class="cat-row-bar-wrap"><div class="cat-row-bar-fill" style="width:42%"></div></div>
        <div class="cat-row-val">42%</div>
      </div>
    </div>
  </section>

</div>

<nav class="tabbar-mobile">
  <button class="tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </button>
  <button class="tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    Learn
  </button>
  <button class="tab active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a7 7 0 0 1 14 0v1"/></svg>
    You
  </button>
</nav>

<script>
  const grid = document.getElementById('cal-grid');
  const levels = [0,0,1,2,3,4,0,1,2,3,2,1,0,2,3,4,4,3,2,1,0,0,1,2,3,4,3,2,1,0,1,2,3,4,3,2,1,0,0,1,2,3,4,4,3,2,1,0,1,2,3,2,1,0,1,2,3,4,3,2,1,0,0,1,2,3,4,2,1,0,1,2,3,4,3,2,1,2,3,4,3,2,1,0];
  for (let r = 0; r < 7; r++) {
    for (let c = 0; c < 12; c++) {
      const idx = c * 7 + r;
      const lv = levels[idx] || 0;
      const cell = document.createElement('div');
      cell.className = 'cal-day' + (lv ? ' l' + lv : '');
      grid.appendChild(cell);
    }
  }
</script>
</body>
</html>
