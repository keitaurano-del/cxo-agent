<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Logic v3 — Lesson (Mobile)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<style>
  .screen { max-width: 430px; margin: 0 auto; padding: 22px 22px 110px; }

  .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
  .icon-btn {
    width: 40px; height: 40px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--r-full);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text);
  }
  .icon-btn svg { width: 18px; height: 18px; }
  .progress-text {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 700;
    color: var(--text-mute);
  }
  .progress-text b { color: var(--text); }

  .progress-bar-wrap { background: var(--surface-2); height: 6px; border-radius: var(--r-full); overflow: hidden; margin-bottom: 32px; }
  .progress-bar-fill { background: var(--accent); height: 100%; width: 30%; border-radius: var(--r-full); }

  .question-block { margin-bottom: 24px; }
  .question-block .eyebrow { color: var(--accent); margin-bottom: 12px; display: block; }
  .question-block h1 {
    font-family: var(--font-display);
    font-size: 30px;
    font-weight: 800;
    line-height: 1.25;
    letter-spacing: -0.025em;
  }

  .hint-card {
    background: var(--accent-soft);
    border-radius: var(--r-lg);
    padding: 18px 20px;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    margin-bottom: 24px;
  }
  .hint-icon { font-size: 22px; line-height: 1; }
  .hint-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent-deep);
    margin-bottom: 6px;
  }
  .hint-body { font-size: 13px; line-height: 1.7; color: var(--accent-deep); }

  .label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-mute);
    margin-bottom: 10px;
  }

  .answer-area {
    background: var(--surface);
    border: 1.5px solid var(--border-2);
    border-radius: var(--r-lg);
    padding: 18px;
    min-height: 180px;
    margin-bottom: 16px;
    transition: border-color 120ms ease;
  }
  .answer-area:focus-within { border-color: var(--accent); }
  .answer-area textarea {
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    font-family: var(--font-ui);
    font-size: 15px;
    line-height: 1.7;
    color: var(--text);
    background: transparent;
    min-height: 150px;
  }
  .answer-area textarea::placeholder { color: var(--text-faint); }

  .submit-btn { width: 100%; }

  .feedback-card {
    background: #ECFDF5;
    border: 1px solid #A7F3D0;
    border-radius: var(--r-lg);
    padding: 22px;
    margin-top: 20px;
  }
  .feedback-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .feedback-check {
    width: 32px; height: 32px;
    border-radius: var(--r-full);
    background: var(--success);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .feedback-check svg { width: 18px; height: 18px; }
  .feedback-title { font-family: var(--font-display); font-size: 17px; font-weight: 800; color: #065F46; }
  .feedback-text { font-size: 13px; color: #047857; line-height: 1.7; }
  .feedback-xp {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 14px;
    padding: 6px 12px;
    background: var(--success);
    color: white;
    border-radius: var(--r-full);
    font-size: 12px;
    font-weight: 700;
    font-family: var(--font-mono);
  }
</style>
</head>
<body>
<div class="screen">

  <div class="topbar">
    <button class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
    </button>
    <div class="progress-text"><b>3</b> / 10</div>
  </div>

  <div class="progress-bar-wrap"><div class="progress-bar-fill"></div></div>

  <div class="question-block">
    <span class="eyebrow">FERMI ESTIMATE</span>
    <h1>日本にある電柱の本数はどれくらい?</h1>
  </div>

  <div class="hint-card">
    <div class="hint-icon">💡</div>
    <div>
      <div class="hint-title">HINT</div>
      <div class="hint-body">国土面積と都市部の電柱密度から推定してみよう。住宅街では電柱は何 m 間隔だろう?</div>
    </div>
  </div>

  <span class="label">Your answer</span>
  <div class="answer-area">
    <textarea placeholder="計算式や考え方を書いてみよう..."></textarea>
  </div>

  <button class="btn btn-primary btn-lg submit-btn">送信する</button>

  <div class="feedback-card">
    <div class="feedback-head">
      <div class="feedback-check">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="feedback-title">Nice approach!</div>
    </div>
    <div class="feedback-text">国土面積と密度から逆算するアプローチは正解です。実際の本数は約 3,600 万本。あなたの推定値は近い範囲に入っています。</div>
    <div class="feedback-xp">+50 XP</div>
  </div>

</div>

<nav class="tabbar-mobile">
  <button class="tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Home
  </button>
  <button class="tab active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
    Learn
  </button>
  <button class="tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a7 7 0 0 1 14 0v1"/></svg>
    You
  </button>
</nav>
</body>
</html>
