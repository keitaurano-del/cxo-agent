<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs><style>.pixel { shape-rendering: crispEdges; }</style></defs>
  <g class="pixel">
    <!-- Body - Steel Blue -->
    <rect x="24" y="28" width="16" height="16" fill="#4A5A7F"/>
    <!-- Left arm (up - active monitoring) -->
    <rect x="18" y="22" width="6" height="14" fill="#4A5A7F"/>
    <!-- Right arm (up - active monitoring) -->
    <rect x="40" y="22" width="6" height="14" fill="#4A5A7F"/>
    <!-- Left leg -->
    <rect x="26" y="44" width="6" height="14" fill="#4A5A7F"/>
    <!-- Right leg -->
    <rect x="32" y="44" width="6" height="14" fill="#4A5A7F"/>
    
    <!-- Neck -->
    <rect x="28" y="24" width="8" height="4" fill="#C0C0C0"/>
    <!-- Head -->
    <rect x="26" y="16" width="12" height="12" fill="#C0C0C0"/>
    
    <!-- Eyes - intense focus -->
    <rect x="28" y="19" width="3" height="2" fill="#FFFFFF"/>
    <rect x="35" y="19" width="3" height="2" fill="#FFFFFF"/>
    <!-- Pupils (wide) -->
    <rect x="29" y="19" width="1" height="2" fill="#000000"/>
    <rect x="36" y="19" width="1" height="2" fill="#000000"/>
    
    <!-- Mouth - focused -->
    <rect x="29" y="24" width="6" height="1" fill="#4A5A7F"/>
    
    <!-- Tech indicator (orange - active) -->
    <rect x="26" y="28" width="12" height="2" fill="#FF8C00"/>
    <rect x="24" y="32" width="3" height="1" fill="#FF8C00"/>
    <rect x="37" y="32" width="3" height="1" fill="#FF8C00"/>
  </g>
</svg>
