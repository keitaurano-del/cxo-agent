<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: transparent -->
  <defs>
    <style>
      .pixel { shape-rendering: crispEdges; }
    </style>
  </defs>

  <!-- Body (Navy Blue #2C3E7F - slightly desaturated for idle state) -->
  <g class="pixel">
    <!-- Torso - upright, relaxed -->
    <rect x="24" y="26" width="16" height="18" fill="#4A5A8F"/>
    <!-- Left arm down -->
    <rect x="18" y="30" width="6" height="12" fill="#4A5A8F"/>
    <!-- Right arm down -->
    <rect x="40" y="30" width="6" height="12" fill="#4A5A8F"/>
    <!-- Left leg -->
    <rect x="26" y="44" width="6" height="14" fill="#4A5A8F"/>
    <!-- Right leg (shifted - weight on one side) -->
    <rect x="32" y="46" width="6" height="12" fill="#4A5A8F"/>

    <!-- Neck -->
    <rect x="28" y="22" width="8" height="4" fill="#B8927A"/>
    <!-- Head -->
    <rect x="26" y="14" width="12" height="12" fill="#B8927A"/>

    <!-- Hammer on ground (Orange #D97000 - desaturated) -->
    <rect x="16" y="42" width="4" height="2" fill="#D97000"/>
    <!-- Hammer head resting -->
    <rect x="14" y="40" width="8" height="2" fill="#D97000"/>

    <!-- Eyes - half-open/drowsy look -->
    <rect x="28" y="17" width="3" height="2" fill="#FFFFFF"/>
    <rect x="35" y="17" width="3" height="2" fill="#FFFFFF"/>
    <!-- Pupils (small, peaceful) -->
    <rect x="29" y="17" width="1" height="1" fill="#1A1A1A"/>
    <rect x="36" y="17" width="1" height="1" fill="#1A1A1A"/>

    <!-- Eyebrows - relaxed/gentle arc -->
    <rect x="27" y="15" width="3" height="1" fill="#6B5D52"/>
    <rect x="36" y="15" width="3" height="1" fill="#6B5D52"/>

    <!-- Mouth - slight smile or neutral -->
    <rect x="29" y="22" width="6" height="1" fill="#8B7355"/>

    <!-- Outline/Border (softer) -->
    <rect x="24" y="26" width="16" height="18" fill="none" stroke="#5A6A9F" stroke-width="0.5"/>
    <rect x="26" y="14" width="12" height="12" fill="none" stroke="#6B7D9F" stroke-width="0.5"/>
  </g>
</svg>
